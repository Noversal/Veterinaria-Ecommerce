<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria Ecommerce</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="root">
        <header class="bg-success">
            <div class="d-flex flex-row w-100 mt-4 mb-4 px-4 justify-content-between">
                <h1>
                    Veterinaria
                </h1>
                <button class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-cart" viewBox="0 0 16 16">
                        <path
                            d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2" />
                    </svg>
                </button>
            </div>
        </header>
        <main class="d-flex flex-column">
            <section class="d-flex flex-column gap-4 w-100 mt-2 mb-2 px-4">
                <div class="search d-flex flex-row gap-2 align-items-center justify-content-center">
                    <button class="btn btn-primary"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                        </svg></button>
                    <input type="text" placeholder="Buscar productos veterinarios...">
                </div>
                <ul id="categories d-flex flex-row gap-2 align-items-center justify-content-center">
                </ul>
                <ul class="d-flex flex-wrap gap-3 list-unstyled align-items-center justify-content-center"
                    id="products-list"></ul>
            </section>
        </main>

        <footer class="bg-success">
            <div class="d-flex justify-content-center p-4">
                <p class="mb-0">Proyecto Realizado por GRUPO 7</p>
            </div>
        </footer>
    </div>

    <div class="modal fade" id="product-modal" tabindex="-1" aria-labelledby="product-modal-label" aria-hidden="true">
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvas-carrito" aria-labelledby="offcanvasCarritoLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasCarritoLabel">Mi lista de compras</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>



        <div class="list-cart offcanvas-body"></div>

        <div>
            <p><span>Total</span> <span id="total-price"></span></p>
        </div>

        <div class="offcanvas-footer p-3 border-top">
            <button id="btn-finalizar" class="btn btn-primary w-100 mb-2">Finalizar compra</button>
            <button id="btn-vaciar" class="btn btn-danger w-100">Vaciar carrito</button>
        </div>
    </div>


    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="index.js" type="module"></script>

</body>

</html>
